name: Docs

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check docs links
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\check-doc-links.ps1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install docs dependencies
        working-directory: docs
        run: npm install

      - name: Build docs
        working-directory: docs
        run: npm run build
